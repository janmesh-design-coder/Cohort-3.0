<!-- index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Deep Style</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ========================= HEADER ========================= -->

    <header class="header">
      <div class="logo">
        <h2>DeepºStyle</h2>
      </div>

      <nav>
        <a href="#">New Arrivels</a>
        <a href="#">Shop</a>
        <a href="#">Beauty</a>
        <a href="#">Sale</a>
        <a href="#">Journal</a>
      </nav>

      <div class="header-icons">
        <img src="./icon/search.svg" alt="" />
        <img src="./icon/user.svg" alt="" />

        <button class="cart-btn">
          <img src="./icon/shopping-cart.svg" alt="" />
        </button>
      </div>
    </header>

    <!-- ==================================================Hero Image========================= -->

    <section class="hero">
      <img class="sunflower" src="./Images/sunflower.png" alt="" />
      <img class="hibiscus" src="./Images/hibiscus.png" alt="" />
      <img class="blossom" src="./Images/blossom.png" alt="" />

      <div class="left-text">
        <span>Summer Collection</span>

        <h3>
          TRANDY AND <br />
          CLUSSI FOR <br />
          NEW SEASSON
        </h3>
      </div>

      <h1>
        Make Your Fashion Look <br />
        More Charming
      </h1>

      <img class="black-star" src="./Images/black_star.png" alt="" />

      <div class="image-grid">
        <div class="card1"><img src="./Images/yellow-topi.png" alt="" /></div>
        <div class="card2"><img src="./Images/kaaliya.png" alt="" /></div>
        <div class="card3"><img src="./Images/g-topi.png" alt="" /></div>
        <div class="card4"><img src="./Images/blue-topi.png" alt="" /></div>
        <div class="card5"><img src="./Images/blue-raincoat.png" alt="" /></div>
        <div class="card6"><img src="./Images/korean_chasma.png" alt="" /></div>
        <div class="card7"><img src="./Images/laal_topi.png" alt="" /></div>
      </div>
    </section>
  </body>
</html>
